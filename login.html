<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Login AZR Transport</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJshO6tgT6OM9_7WjWhF5a3Jc-0eajyj4",
  authDomain: "azr-transport.firebaseapp.com",
  projectId: "azr-transport",
  storageBucket: "azr-transport.firebasestorage.app",
  messagingSenderId: "1039061356959",
  appId: "1:1039061356959:web:f4042c38ca5061d29dedaa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginUser = async () => {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);

alert("Connexion réussie ✅");

setTimeout(() => {
  window.location.replace("index.html");
}, 500);

  } catch (error) {
    alert("Erreur ❌ " + error.message);
  }
};
</script>

<style>
body{
font-family:Arial;
background:#eef2ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:20px;
border-radius:12px;
width:300px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="card">
<h3>🚛 AZR LOGIN</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">

<button onclick="loginUser()">Se connecter</button>
</div>

</body>
</html>
